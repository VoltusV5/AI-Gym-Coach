services:
  backend:
    build:
      context: ./backend
      dockerfile: ./cmd/sport_app/Dockerfile
    container_name: backend
    env_file:
      - ./backend/.env
    ports:
      - "5050:5050"
    restart: always
    volumes:
    - ./backend/out/logs:/app/logs
    - ./backend/static:/app/static
  
  ml:
    build:
      context: ./ai
      dockerfile: Dockerfile
      args:
        HOST: ${HOST}
        PORT: ${PORT}
    container_name: ml
    env_file:
      - ./ai/.env
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: always

  ml-chat:
    build:
      context: ./ai
      dockerfile: Dockerfile
      args:
        HOST: ${HOST}
        PORT: ${PORT}
    container_name: ml-chat
    env_file:
      - ./ai/.env
    ports:
      - "8001:8000"
    command: ["uvicorn", "chat.chat_ml_service:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: always
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_USE_WORKOUT_MOCKS: ${VITE_USE_WORKOUT_MOCKS}
    container_name: frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    restart: always

  sportapp-postgres:
    image: postgres:18.1-bookworm
    container_name: sportapp-env-postgres
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/out/pgdata:/var/lib/postgresql
    command: postgres -c listen_addresses='*'
    restart: always

  sportapp-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./backend/migrations:/migrations
    command:
      - -path=/migrations/
      - -database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?sslmode=disable
      - up
  
  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: sportapp-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:sportapp-postgres:5432
    ports:
      - "127.0.0.1:5433:5432"