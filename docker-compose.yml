services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sport
      POSTGRES_PASSWORD: sport
      POSTGRES_DB: sport
    # 5433 на хосте — чтобы не пересекаться с локальным PostgreSQL на 5432
    ports:
      - "5433:5432"
    volumes:
      - sport_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sport -d sport"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  sport_pg:
