server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Бэкенд: только /api/… (клиент ходит на /api/v1/…)
    # Сохраняем префикс /api (раньше обрезался → /v1/... вместо /api/v1/...)
    location /api/ {
        proxy_pass http://backend:5050/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Не кешировать shell SPA — иначе после деплоя браузер держит старый index.html и старые хеши JS.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # SPA fallback (/nutrition, /settings, …): отдаём index.html без кеша (префикс /assets/ длиннее — статика кешируется отдельно).
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}